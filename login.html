<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED DRAGON FC — Acceso al Club</title>

<link rel="icon" href="imagenes/MANDO.png" type="image/png">

<style>
/* (TODO TU CSS IGUAL, NO SE TOCA) */
</style>
</head>

<body>

<div class="main">
<div class="auth-wrap">

<div id="mensajeExito" class="alerta-exito">
¡REGISTRO EXITOSO! YA PUEDES INICIAR SESIÓN
</div>

<div class="auth-tabs">
<button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
<button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
</div>

<div class="glass-panel">

<!-- LOGIN -->
<form class="form-section active" id="loginSection" action="login.php" method="POST" autocomplete="off">

<div class="panel-title">Bienvenido</div>

<div class="form-group">
<label>Correo Electrónico</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" name="password" required>
</div>

<button type="submit" class="btn-submit">Entrar</button>

</form>

<!-- REGISTRO 🔥 CORREGIDO -->
<form class="form-section" id="registerSection" action="registro.php" method="POST" autocomplete="off">

<div class="panel-title">Crear Cuenta</div>

<div class="form-group">
<label>Nombre</label>
<input type="text" name="nombre" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Contraseña</label>
<input type="password" name="password" minlength="8" required>
</div>

<!-- 🔥 IMPORTANTE -->
<button type="submit" name="registrar" class="btn-submit">
Registrar
</button>

</form>

</div>
</div>
</div>

<script>
// CAMBIO DE TABS
function switchTab(tab){
document.getElementById('loginSection').classList.remove('active');
document.getElementById('registerSection').classList.remove('active');

if(tab==='login'){
document.getElementById('loginSection').classList.add('active');
}else{
document.getElementById('registerSection').classList.add('active');
}
}

// MENSAJE DE ÉXITO
const params = new URLSearchParams(window.location.search);
if(params.get('registro') === 'exito'){
document.getElementById('mensajeExito').style.display = 'block';
}
</script>

</body>
</html>
