<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RED DRAGON FC — Jugadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff1a1a;--orange:#ff6500;
  --red-glow:rgba(255,26,26,0.5);--orange-glow:rgba(255,101,0,0.4);
  --bg:#050100;--bg2:#0c0200;
  --glass:rgba(255,60,0,0.06);--border:rgba(255,80,0,0.12);
  --text:#fff5ef;--muted:#7a5545;--grid:rgba(255,30,0,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow-x:hidden;cursor:none;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:55px 55px;pointer-events:none;z-index:0;}
.cursor{position:fixed;width:10px;height:10px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 18px var(--red-glow);transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:34px;height:34px;border:1px solid rgba(255,26,26,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all 0.12s ease;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:76px;background:rgba(5,1,0,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:all 0.4s;}
nav.scrolled{background:rgba(5,1,0,0.98);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:6px;background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;line-height:1;}
.nav-logo sub{display:block;font-size:0.5rem;letter-spacing:8px;-webkit-text-fill-color:rgba(255,100,0,0.6);margin-top:-3px;}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:0.83rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--red);transition:width 0.3s;}
.nav-links a:hover,.nav-links a.active{color:var(--text);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-cta{background:var(--red)!important;color:#000!important;padding:9px 22px!important;border-radius:2px;font-weight:700!important;box-shadow:0 0 18px var(--red-glow);}
.nav-cta::after{display:none!important;}
.nav-icon-link{display:flex;align-items:center;padding:6px!important;border:1px solid var(--border)!important;border-radius:50%!important;color:var(--muted)!important;transition:all 0.3s!important;}
.nav-icon-link:hover{border-color:var(--red)!important;color:var(--text)!important;box-shadow:0 0 14px rgba(255,26,26,0.3)!important;}
.nav-icon-link::after{display:none!important;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
.hamburger span{display:block;width:22px;height:2px;background:var(--red);}

/* PAGE HEADER */
.page-header{padding:9rem 5% 3rem;position:relative;z-index:1;text-align:center;}
.page-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--orange);margin-bottom:0.8rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,8vw,6.5rem);letter-spacing:4px;text-transform:uppercase;margin-bottom:0.5rem;}
.page-title .accent{background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-sub{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:4px;color:var(--muted);text-transform:uppercase;}

/* ROSTER */
.roster{display:flex;max-width:1200px;margin:2rem auto 6rem;height:660px;border:1px solid var(--border);background:rgba(10,2,0,0.5);backdrop-filter:blur(20px);position:relative;z-index:1;overflow:hidden;}

/* LIST */
.player-list{width:300px;border-right:1px solid var(--border);overflow-y:auto;background:rgba(0,0,0,0.3);flex-shrink:0;}
.player-list::-webkit-scrollbar{width:3px;}
.player-list::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.list-header{padding:18px 20px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--orange);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;letter-spacing:3px;}
.player-item{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;transition:all 0.25s;border-bottom:1px solid rgba(255,255,255,0.02);border-left:3px solid transparent;}
.player-item:hover{background:rgba(255,26,26,0.08);}
.player-item.active{background:linear-gradient(90deg,rgba(255,26,26,0.15),transparent);border-left-color:var(--red);}
.pi-pos{background:var(--red);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;padding:2px 7px;border-radius:1px;min-width:38px;text-align:center;letter-spacing:1px;}
.pi-pos.def{background:rgba(255,26,26,0.3);color:var(--red);}
.pi-pos.mid{background:rgba(255,101,0,0.3);color:var(--orange);}
.pi-pos.att{background:var(--red);color:#000;}
.pi-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;font-size:1rem;letter-spacing:1px;}
.pi-emoji{font-size:1.1rem;}

/* DETAIL */
.player-detail{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(circle at 50% 50%,rgba(255,26,26,0.04) 0%,transparent 70%);}
.card{background:rgba(255,255,255,0.02);border:1px solid var(--border);width:100%;max-width:380px;padding:40px;text-align:center;animation:cardIn 0.4s ease;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card-emoji{font-size:5rem;margin-bottom:16px;filter:drop-shadow(0 0 20px var(--red-glow));display:block;}
.card-pos-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--red),var(--orange));color:#000;padding:4px 14px;border-radius:1px;margin-bottom:12px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:3.8rem;line-height:1;margin-bottom:6px;letter-spacing:2px;}
.card-psn{color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;margin-bottom:28px;}
.card-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:28px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.stat-box{text-align:left;}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--red);line-height:1;}
.stat-bar{width:100%;height:3px;background:rgba(255,255,255,0.04);margin-top:6px;border-radius:2px;}
.stat-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:2px;transition:width 1s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px var(--red-glow);}

/* FOOTER */
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:4rem 5%;display:flex;flex-direction:column;align-items:center;gap:2rem;background:rgba(5,1,0,0.7);}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:8px;background:linear-gradient(90deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.footer-socials{display:flex;gap:1rem;}
.social-link{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border:1px solid var(--border);border-radius:3px;color:var(--muted);text-decoration:none;transition:all 0.3s;}
.social-link:hover{border-color:var(--red);color:#fff;box-shadow:0 0 18px rgba(255,26,26,0.3);transform:translateY(-3px);}
.footer-copy{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;opacity:0.5;}

@media(max-width:900px){
  .nav-links{display:none;position:absolute;top:76px;left:0;right:0;flex-direction:column;background:rgba(5,1,0,0.98);padding:2rem 5%;gap:1.5rem;border-bottom:1px solid var(--border);}
  .nav-links.open{display:flex;}
  .hamburger{display:flex;}
  .roster{flex-direction:column;height:auto;}
  .player-list{width:100%;height:220px;border-right:none;border-bottom:1px solid var(--border);}
  .player-detail{padding:24px;}
}
</style>
</head>

<nav id="mainNav">

<footer>
  <div class="footer-logo">RED DRAGON</div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';});
window.addEventListener('scroll',()=>document.getElementById('mainNav').classList.toggle('scrolled',window.scrollY>50));
function toggleMenu(){document.getElementById('navLinks').classList.toggle('open');}

const players=[
  {name:"ShadowK",pos:"POR",cat:"def",emoji:"🧤",psn:"PSN: ShadowK_99",g:0,a:1},
  {name:"Alex-T",pos:"LI",cat:"def",emoji:"🏃",psn:"PSN: AlexT_Lateral",g:2,a:15},
  {name:"IronWall",pos:"DFC",cat:"def",emoji:"🛡️",psn:"XBX: IronWall_Pro",g:5,a:2},
  {name:"TheRock",pos:"DFC",cat:"def",emoji:"🧱",psn:"PSN: Rock_Def",g:4,a:1},
  {name:"Turbo-V",pos:"LD",cat:"def",emoji:"🏎️",psn:"PSN: TurboV_01",g:1,a:12},
  {name:"VoltMid",pos:"MC",cat:"mid",emoji:"⚡",psn:"PSN: Volt_88",g:12,a:25},
  {name:"Maestro",pos:"MCD",cat:"mid",emoji:"🧠",psn:"PSN: MaestroFUT",g:3,a:18},
  {name:"Creative",pos:"MC",cat:"mid",emoji:"🎨",psn:"PSN: Creative_Art",g:8,a:30},
  {name:"DragonB",pos:"EI",cat:"att",emoji:"🔥",psn:"PSN: DragonB_25",g:45,a:20},
  {name:"Titan",pos:"DC",cat:"att",emoji:"🎯",psn:"XBX: Titan_Striker",g:62,a:10},
  {name:"Flash",pos:"ED",cat:"att",emoji:"⚡",psn:"PSN: Flash_ED",g:38,a:22}
];

const list=document.getElementById('playerList');

function renderDetail(i){
  const p=players[i];
  const gw=Math.min((p.g/70)*100,100);
  const aw=Math.min((p.a/40)*100,100);
  document.getElementById('playerDetail').innerHTML=`
    <div class="card">
      <span class="card-emoji">${p.emoji}</span>
      <div class="card-pos-badge">${p.pos}</div>
      <h2 class="card-name">${p.name}</h2>
      <div class="card-psn">${p.psn}</div>
      <div class="card-divider"></div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">⚽ Goles</div>
          <div class="stat-val">${p.g}</div>
          <div class="stat-bar"><div class="stat-bar-fill" id="gb" style="width:0%"></div></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">👟 Asistencias</div>
          <div class="stat-val">${p.a}</div>
          <div class="stat-bar"><div class="stat-bar-fill" id="ab" style="width:0%"></div></div>
        </div>
      </div>
    </div>`;
  setTimeout(()=>{
    document.getElementById('gb').style.width=gw+'%';
    document.getElementById('ab').style.width=aw+'%';
  },50);
}

players.forEach((p,i)=>{
  const item=document.createElement('div');
  item.className='player-item'+(i===0?' active':'');
  item.innerHTML=`<span class="pi-emoji">${p.emoji}</span><span class="pi-pos ${p.cat}">${p.pos}</span><span class="pi-name">${p.name}</span>`;
  item.onclick=()=>{
    document.querySelectorAll('.player-item').forEach(x=>x.classList.remove('active'));
    item.classList.add('active');
    renderDetail(i);
  };
  list.appendChild(item);
});
renderDetail(0);
</script>
</body>
